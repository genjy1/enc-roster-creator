services:

  # ─── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ─── Laravel (PHP-FPM) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
      - /var/www/backend/vendor         # vendor остаётся в контейнере
    environment:
      APP_ENV: local
      APP_KEY: ""                        # будет сгенерирован при старте
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: enc_roster
      DB_USERNAME: enc_user
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Vue 3 / Vite ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules               # node_modules остаётся в контейнере
    environment:
      VITE_API_BASE_URL: http://localhost/api
    restart: unless-stopped

  # ─── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: enc_roster
      MYSQL_USER: enc_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"                     # для доступа из IDE/DBeaver
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── FlareSolverr (Cloudflare bypass) ────────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
    ports:
      - "8191:8191"
    profiles:
      - scraper
    restart: "no"

  # ─── HLTV scraper ─────────────────────────────────────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    volumes:
      - ./backend/storage/app:/scraper/output
    environment:
      OUTPUT_PATH: /scraper/output/players.json
      FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      - flaresolverr
    profiles:
      - scraper
    restart: "no"

  # ─── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"                     # для доступа извне
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
