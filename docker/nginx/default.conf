server {
    listen 80;
    server_name localhost;

    # ─── API → PHP-FPM (Laravel) ──────────────────────────────────────────────
    # Передаём всё напрямую в index.php, Laravel сам роутит по REQUEST_URI
    location /api {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/backend/public;
        fastcgi_param SERVER_NAME     $host;
        include fastcgi_params;
    }

    # ─── Frontend → Vite dev server ───────────────────────────────────────────
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;

        # WebSocket для Vite HMR
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host          $host;
        proxy_set_header X-Real-IP     $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
