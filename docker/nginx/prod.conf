server {
    listen 80;
    server_name _;

    # ─── API → PHP-FPM (Laravel) ──────────────────────────────────────────────
    location /api {
        fastcgi_pass backend:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/backend/public;
        fastcgi_param SERVER_NAME     $host;
        include fastcgi_params;
    }

    # ─── Frontend → static SPA ────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # Кэш для статических ассетов (Vite добавляет hash в имена файлов)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
}
